site_name: AI Lab Notes
site_description: AI R&D 실험 노트
site_author: jungjaewa
site_url: https://jungjaewa.github.io/ai-lab-notes/

repo_name: jungjaewa/ai-lab-notes
repo_url: https://github.com/jungjaewa/ai-lab-notes

theme:
  name: material
  language: ko
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 다크 모드
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 라이트 모드
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search:
      lang:
        - ko
        - en
  - tags:
      tags_file: tags.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Eye Pipeline:
    - eye-pipeline/index.md
    - Readme: eye-pipeline/README.md
  - Teamplay_Gantt:
    - teamplay_gantt/index.md
    - Skills Guide: teamplay_gantt/SKILLS_GUIDE.md
    - Claude: teamplay_gantt/CLAUDE.md
    - Plan: teamplay_gantt/PLAN.md
  - AI Lab Notes Manager:
    - ai-lab-notes-manager/index.md
    - Claude: ai-lab-notes-manager/CLAUDE.md
    - Plan: ai-lab-notes-manager/PLAN.md
    - Rnd Log: ai-lab-notes-manager/RND_LOG.md
    - Skills Guide: ai-lab-notes-manager/SKILLS_GUIDE.md
  - PSD:
    - psd/index.md
    - Claude: psd/CLAUDE.md
    - Readme: psd/README.md
    - Automation Plan: psd/automation_plan.md
    - Dev Journal: psd/dev_journal.md
    - Human Vs Ai Workflow: psd/human_vs_ai_workflow.md
    - Layer Exporter: psd/layer_exporter.md
    - Naming Convention: psd/naming_convention.md
    - Psd Extractor: psd/psd_extractor.md
    - Psd Extractor Gui Ctk: psd/psd_extractor_gui_ctk.md
    - Psd Extractor Gui Qt: psd/psd_extractor_gui_qt.md
    - Unity Dev History: psd/unity_dev_history.md
    - Unity Technical Notes: psd/unity_technical_notes.md
  - 태그: tags.md
